  <script>
    (function () {
      var form = document.getElementById('footer-subscribe-form');
      var msg  = document.getElementById('footer-subscribe-msg');
      if (!form) return;

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = form.email.value.trim();
        if (!email) return;

        var btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = '\u2026';

        fetch('https://formspree.io/f/mlgwpbyj', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email: email, _subject: 'New subscriber: ' + email })
        })
        .then(function () {
          msg.textContent = 'Thanks! You\'re on the list.';
          msg.style.color = 'var(--text-primary, #24292e)';
          form.reset();
        })
        .catch(function () {
          msg.textContent = 'Something went wrong. Please try again.';
          msg.style.color = 'red';
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = 'Subscribe';
        });
      });
    })();
  </script>
